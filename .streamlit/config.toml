# Clean-light theme — keeps the deployed app visually in sync with the
# Plotly palette defined in steam_eda.py / app.py.
[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F6F8"
textColor = "#1F2933"
font = "sans serif"

[browser]
gatherUsageStats = false
